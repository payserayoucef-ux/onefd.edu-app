        /* ====== المتغيرات والأنيميشن ====== */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes fadeInUp {
            from {

                transform: translateY(20px);
            }
            to {

                transform: translateY(0);
            }
        }

            25% { transform: translateX(-5px); }

        #check-level-page select:focus, #check-level-page input[type="number"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }

        #check-level-page .check-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        #check-level-page .check-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .result-message {
            padding: 20px;
            margin-top: 20px;
            border-radius: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
        }

        .success { 
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            border: 2px solid #28a745;
        }
        
        .failure { 
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border: 2px solid #dc3545;
        }

        /* تصميم صفحة المراكز الولائية */
        #centers-page select {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #667eea;
            border-radius: 15px;
            font-size: 1rem;
            background: white;
        }

        .center-info {
            border: 2px solid #667eea;
            padding: 25px;
            border-radius: 20px;
            background: linear-gradient(135deg, #e7f4ff, #d4e9ff);
            margin-top: 20px;
            animation: fadeInUp 0.3s ease-out;
        }
        
        .center-info p {
            margin: 15px 0;
            font-size: 1.1rem;
        }
        
        .center-info p i {
            color: #667eea;
            margin-left: 15px;
            animation: pulse 2s infinite;
        }
        
        .center-info a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .center-info a:hover {
            text-decoration: underline;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* تنسيقات صفحة معلومات الامتحان */
        .info-section {
            background: linear-gradient(135deg, #e7f4ff, #d4e9ff);
            border: 2px solid #667eea;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .info-section ul {
            list-style: none;
            padding-right: 0;
        }

        .info-section li {
            margin-bottom: 15px;
            border-right: 4px solid #667eea;
            padding-right: 15px;
            padding: 10px 15px;
            background: rgba(255,255,255,0.7);
            border-radius: 10px;
        }
        
        .info-section li:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
       
        .info-section p.important-note {
            color: #dc3545;
            font-weight: bold;
            border: 2px dashed #dc3545;
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.9);
        }
        
        /* تنسيقات التبرع */
        .donation-box {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
            border: 2px solid #667eea;
            animation: glow 2s infinite;
        }
        
        .donation-box h3 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .donation-box p {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 15px;
            border-radius: 15px;
        }
        
        .copy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        /* شريط التحميل */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        /* تحسينات للهواتف */
        @media (max-width: 768px) {
            .main-buttons-container {
                grid-template-columns: 1fr;
            }
            
            .social-media-container {
                flex-wrap: wrap;
            }
            
            .welcome-section h1 {
                font-size: 2rem;
            }
            
            .welcome-section h2 {
                font-size: 1rem;
            }
            
            .sub-page {
                padding: 20px;
                margin: 10px;
            }
            
            .floating-sticker {
                font-size: 2rem;
                opacity: 0.1;
            }
        }
        
        /* تأثيرات إضافية */
        hr {
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, #667eea, #764ba2, transparent);
            margin: 30px 0;
        }
        
        /* تنسيق الجدول */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
        }
        
        td {
            padding: 12px;
            background: white;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover td {
            background: #f5f5f5;
        }
    </style>
</head>
